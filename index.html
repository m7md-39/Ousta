<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ousta | أُسطى — منصة الصيانة المنزلية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@300;400;500;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  /* ===== Talabat-inspired palette =====
     Primary orange, near-black ink, clean white surfaces, a touch of amber accent. */
  --ink:#1A1A1A;
  --paper:#FFFFFF;
  --paper-2:#F6F6F8;
  --navy:#1A1A1A;      /* dark surface (was navy, now Talabat-style near-black) */
  --navy-2:#2B2B2D;
  --brass:#FF5A00;     /* primary orange */
  --brass-2:#FF7A2E;   /* hover orange */
  --amber:#FFC22E;     /* secondary amber accent */
  --green:#1DB86A;
  --red:#E5484D;
  --line: rgba(26,26,26,0.12);
  --shadow: 0 10px 26px rgba(26,26,26,0.10);
  --radius: 14px;
  --disp: 'Cairo', sans-serif;
  --body: 'Tajawal', sans-serif;
  --mono: 'IBM Plex Sans Arabic', sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
html, body{ height:100%; overflow:hidden; }
body{
  font-family: var(--body);
  background: var(--paper-2);
  color: var(--ink);
}
::selection{ background: var(--amber); color: var(--ink); }
a{color:inherit;}
button{ font-family:inherit; cursor:pointer; border:none; }
input, textarea, select{ font-family:inherit; }
:focus-visible{ outline: 3px solid var(--brass); outline-offset:2px; }

/* ===== Login Screen (two-panel hero design) ===== */
#loginScreen{
  height:100vh; width:100vw; position:fixed; inset:0; overflow:hidden;
  background: radial-gradient(circle at top right, rgba(255,194,46,0.18), transparent 22%),
              radial-gradient(circle at 15% 10%, rgba(255,255,255,0.10), transparent 18%),
              linear-gradient(180deg, #111111 0%, #1A1A1A 48%, #0F0F0F 100%);
}
.ols-shell{
  position:relative; z-index:1; height:100vh; display:grid; align-items:stretch;
  grid-template-columns: minmax(300px, 40%) minmax(360px, 60%);
  gap:18px; padding:18px;
}
.ols-panel{ border-radius:24px; overflow:hidden; display:flex; flex-direction:column; box-shadow: 0 26px 80px rgba(0,0,0,0.24); min-height:0; }
.ols-hero{
  background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); backdrop-filter: blur(16px);
  padding:22px; display:flex; flex-direction:column; justify-content:space-between;
}
.ols-hero-top{ display:flex; justify-content:flex-end; }
.ols-hero-badge{
  display:inline-flex; align-items:center; gap:8px; padding:9px 14px; border-radius:999px; color:#fff;
  background: rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.18); font-size:0.82rem; font-weight:700;
  backdrop-filter: blur(12px);
}
.ols-hero-badge i{ color: var(--amber); }
.ols-hero-title{
  margin-top:16px; font-family: var(--disp); color:#fff; font-size: clamp(1.7rem, 2.6vw, 2.7rem);
  line-height:1.05; font-weight:900; letter-spacing:0.3px;
}
.ols-hero-text{ margin-top:12px; color: rgba(255,255,255,0.90); font-size:0.88rem; line-height:1.6; max-width:520px; }
.ols-hero-cards{ display:grid; grid-template-columns:1fr; gap:10px; margin-top:auto; }
.ols-hero-card{
  display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:18px;
  background: rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.14); min-height:60px;
}
.ols-hero-card-icon{
  width:40px; height:40px; border-radius:14px; background: rgba(255,255,255,0.14);
  display:grid; place-items:center; color: var(--brass); font-size:1rem; flex-shrink:0;
}
.ols-hero-card-copy{ text-align:right; flex:1; }
.ols-hero-card-copy strong{ display:block; font-size:0.88rem; font-weight:800; color:#fff; margin-bottom:2px; }
.ols-hero-card-copy span{ color: rgba(255,255,255,0.78); font-size:0.78rem; line-height:1.5; }

.ols-login{ background:#fff; padding:22px 26px; display:flex; flex-direction:column; justify-content:center; }
.ols-card{ display:flex; flex-direction:column; gap:12px; }
.ols-login-top{ display:flex; align-items:center; gap:12px; }
.ols-brand-mark{ width:46px; height:46px; border-radius:15px; overflow:hidden; flex-shrink:0; box-shadow: 0 12px 26px rgba(255,90,0,0.24); }
.ols-brand-mark img{ width:100%; height:100%; object-fit:cover; }
.ols-brand-name{ font-family: var(--disp); font-size:1.3rem; font-weight:900; letter-spacing:0.3px; direction:ltr; color: var(--ink); }
.ols-brand-name span{ color: var(--brass); }
.ols-brand-desc{ color:#6c6c6c; font-size:0.8rem; line-height:1.4; margin-top:2px; }

.ols-tabs{ display:flex; background: var(--paper-2); border-radius:12px; padding:3px; }
.ols-tab{ flex:1; padding:8px; border-radius:9px; font-weight:700; font-size:0.84rem; color:#6b6b6b; text-align:center; background:transparent; transition: all .18s; }
.ols-tab.active{ background: var(--ink); color:#fff; }

.ols-section-head h2{ font-size:1.15rem; font-weight:900; color: var(--ink); margin-bottom:2px; }
.ols-section-head p{ color:#6f6f6f; font-size:0.8rem; line-height:1.4; }

.ols-fields{ display:flex; flex-direction:column; gap:10px; }
.ols-group label{ display:block; font-size:0.8rem; font-weight:700; color:#4a4a4a; margin-bottom:5px; }
.ols-input-ic{ position:relative; }
.ols-input-ic i{ position:absolute; top:50%; transform:translateY(-50%); right:14px; color:#9a9a9a; font-size:0.78rem; }
.ols-input-ic input{
  width:100%; border:1.5px solid var(--line); border-radius:14px; padding:10px 38px 10px 14px;
  font-size:0.88rem; background:#fbfbfb; color: var(--ink);
}
.ols-input-ic input:focus{ outline:none; border-color: rgba(255,90,0,0.35); box-shadow: 0 0 0 4px rgba(255,90,0,0.12); }
input.ols-input-error{ border-color:#D93025 !important; box-shadow: 0 0 0 4px rgba(217,48,37,0.10) !important; }

.ols-account-row label{ display:block; font-size:0.8rem; font-weight:700; color:#4a4a4a; margin-bottom:5px; }
.ols-account-type-options{ display:flex; gap:8px; flex-wrap:wrap; }
.ols-radio-option{
  flex:1; display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 12px;
  border:1.5px solid var(--line); border-radius:13px; background:#fbfbfb; color:#4a4a4a; font-weight:700;
  cursor:pointer; transition: all .18s ease; font-size:0.82rem;
}
.ols-radio-option i{ color: var(--brass); }
.ols-radio-option:hover{ border-color: rgba(255,90,0,0.28); background:#fff; }
.ols-radio-option.selected{ border-color: var(--brass); background:#FFF4EC; box-shadow: var(--shadow); }

.ols-error{
  color:#D93025; background: rgba(217,48,37,0.08); border:1.5px solid rgba(217,48,37,0.25);
  border-radius:12px; padding:8px 12px; font-size:0.8rem; font-weight:700; text-align:right;
}

.ols-footer{ display:flex; flex-direction:column; gap:8px; }
.ols-submit{
  width:100%; border-radius:14px; padding:12px 16px; border:none;
  background: linear-gradient(135deg, var(--brass), var(--brass-2)); color:#fff; font-size:0.9rem; font-weight:800;
  transition: transform .2s ease, box-shadow .2s ease;
}
.ols-submit:hover{ transform: translateY(-1px); box-shadow: 0 22px 36px rgba(255,90,0,0.26); }
.ols-submit:disabled{ opacity:0.75; cursor:not-allowed; transform:none !important; box-shadow:none !important; }
.ols-note{ color:#6c6c6c; font-size:0.8rem; line-height:1.4; text-align:center; }
.ols-note button{ background:none; color: var(--brass); font-weight:700; }
.ols-admin-link{ display:block; text-align:center; font-size:0.82rem; color:#b8b8b8; }

@media (max-width: 980px){
  .ols-shell{ grid-template-columns: 1fr; padding:20px; gap:20px; }
  .ols-hero, .ols-login{ padding:24px; }
  .ols-hero-title{ font-size: clamp(2rem, 7vw, 2.8rem); }
  .ols-brand-name{ font-size:1.4rem; }
}

/* ===== Topbar ===== */
.topbar{
  background: var(--ink);
  color: #fff;
  padding: 12px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  position: sticky; top:0; z-index:50;
  border-bottom: 3px solid var(--brass);
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{
  width:40px; height:40px; border-radius:11px; overflow:hidden; background:#fff;
  display:flex; align-items:center; justify-content:center; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.08);
  flex-shrink:0;
}
.brand-mark img{ width:100%; height:100%; object-fit:cover; }
.brand-text{ font-family:var(--disp); font-weight:900; font-size:21px; letter-spacing:0.4px; direction:ltr; }
.brand-text span{ color:var(--brass); }
.brand-sub{ font-size:11px; color: rgba(255,255,255,0.55); font-weight:400; margin-top:-2px; }

.role-switch{
  display:flex; background: rgba(255,255,255,0.07); border-radius:999px; padding:4px; gap:2px;
  border:1px solid rgba(255,255,255,0.12);
}
.role-btn{
  background:transparent; color: rgba(255,255,255,0.65);
  padding:8px 18px; border-radius:999px; font-size:14px; font-weight:600;
  transition: all .2s ease; white-space:nowrap; display:flex; align-items:center; gap:6px;
}
.role-btn.active{ background: var(--brass); color:#fff; }
.role-btn:not(.active):hover{ color:#fff; background: rgba(255,255,255,0.1); }

.topbar-right{ display:flex; align-items:center; gap:12px; }
.bell-wrap{ position:relative; }
.bell-btn{
  background: rgba(255,255,255,0.08); color:#fff; width:38px;height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:15px;
  border:1px solid rgba(255,255,255,0.12);
}
.bell-dot{
  position:absolute; top:-2px; left:-2px; background: var(--red); color:#fff; font-size:10px;
  border-radius:50%; width:16px; height:16px; display:flex; align-items:center; justify-content:center;
  font-weight:700; border:2px solid var(--ink);
}
.profile-wrap{ position:relative; }
.profile-btn{
  display:flex; align-items:center; gap:8px; background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14);
  border-radius:999px; padding:5px 8px 5px 12px; color:#fff;
}
.profile-btn:hover{ background: rgba(255,255,255,0.15); }
.profile-ic{
  width:30px; height:30px; border-radius:50%; background: var(--brass); display:flex; align-items:center; justify-content:center;
  font-size:14px; color:#fff; flex-shrink:0;
}
.profile-name{ font-size:13.5px; font-weight:700; }
.profile-btn .fa-chevron-down{ font-size:10px; opacity:0.7; }
.profile-menu{
  position:absolute; top:calc(100% + 10px); left:0; background:#fff; color:var(--ink); border-radius:12px;
  box-shadow: 0 14px 34px rgba(0,0,0,0.20); min-width:190px; overflow:hidden; z-index:80; border:1px solid var(--line);
}
.profile-menu button{
  display:flex; align-items:center; gap:10px; width:100%; text-align:right; padding:12px 14px; font-size:14px; font-weight:600; background:#fff;
}
.profile-menu button:hover{ background:var(--paper-2); }
.profile-menu button i{ width:16px; color:var(--brass); }
.profile-menu .logout-item{ color:var(--red); border-top:1px solid var(--line); }
.profile-menu .logout-item i{ color:var(--red); }

/* ===== Layout ===== */
.shell{ display:flex; max-width:1400px; margin:0 auto; height: calc(100vh - 63px); }
.sidebar{
  width:230px; flex-shrink:0; background: #fff; border-left: 1px solid var(--line);
  padding: 20px 14px; display:flex; flex-direction:column; gap:4px;
  position:sticky; top:63px; height:calc(100vh - 63px); overflow-y:auto; align-self:flex-start;
}
.side-eyebrow{ font-size:11px; color:#9a9a9a; font-weight:700; letter-spacing:1px; padding: 8px 10px 4px; }
.side-btn{
  background:transparent; text-align:right; padding:11px 14px; border-radius:10px; font-size:14.5px;
  font-weight:500; color: var(--ink); display:flex; align-items:center; gap:12px; transition: all .15s; flex-shrink:0;
}
.side-btn .ic{ font-size:15px; width:20px; text-align:center; color:#9a9a9a; }
.side-btn:hover{ background: rgba(255,90,0,0.08); }
.side-btn.active{ background: var(--ink); color: #fff; font-weight:700; }
.side-btn.active .ic{ color:var(--brass); }

.content{ flex:1; padding: 28px 32px; min-width:0; height:calc(100vh - 63px); overflow-y:auto; }
.view{ animation: fadeUp .35s ease; }
@keyframes fadeUp{ from{ opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

.page-head{ margin-bottom:22px; }
.page-head h1{ font-family:var(--disp); font-size:26px; font-weight:800; }
.page-head p{ color:#7a7a7a; font-size:14.5px; margin-top:4px; }

/* ===== Cards / grid ===== */
.grid{ display:grid; gap:16px; }
.grid-3{ grid-template-columns:repeat(3,1fr); }
.grid-4{ grid-template-columns:repeat(4,1fr); }
.grid-2{ grid-template-columns:repeat(2,1fr); }
@media (max-width:1000px){
  .grid-3,.grid-4{grid-template-columns:repeat(2,1fr);}
  .shell{flex-direction:column; height:auto;}
  .sidebar{width:100%; flex-direction:row; overflow-x:auto; overflow-y:visible; position:static; height:auto;}
  .content{height:auto; overflow-y:visible;}
  html, body{ overflow:auto; }
  .account-choice{grid-template-columns:1fr;}
}

.card{
  background:#fff; border:1px solid var(--line); border-radius: var(--radius); padding:18px;
  box-shadow: var(--shadow);
}
.service-tile{
  background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:20px 14px; text-align:center;
  transition: all .18s ease; display:flex; flex-direction:column; align-items:center; gap:8px;
}
.service-tile:hover{ border-color: var(--brass); transform: translateY(-3px); box-shadow: var(--shadow); }
.service-tile.selected{ border-color:var(--brass); background: #FFF4EC; box-shadow: var(--shadow); }
.service-emoji{ font-size:26px; color:var(--brass); }
.service-name{ font-weight:700; font-size:15px; }

/* ===== Full-space service selection grid ===== */
.services-fill{
  display:grid; grid-template-columns:repeat(3,1fr); gap:20px;
  min-height:calc(100vh - 63px - 56px - 96px); align-content:stretch;
}
.services-fill .service-tile{ justify-content:center; padding:0; border-radius:18px; }
.services-fill .service-emoji{ font-size:44px; margin-bottom:6px; }
.services-fill .service-name{ font-size:18px; }
@media (max-width:1000px){ .services-fill{ grid-template-columns:repeat(2,1fr); min-height:auto; } }

.btn{
  padding:10px 20px; border-radius:10px; font-weight:700; font-size:14px; transition: all .15s;
  display:inline-flex; align-items:center; gap:8px; justify-content:center;
}
.btn-primary{ background: var(--brass); color:#fff; }
.btn-primary:hover{ background: var(--brass-2); }
.btn-primary:disabled{ background:#f0c7ab; cursor:not-allowed; }
.btn-outline{ background:transparent; border:1.5px solid var(--ink); color:var(--ink); }
.btn-outline:hover{ background: var(--ink); color:#fff; }
.btn-ghost{ background: rgba(26,26,26,0.06); color:var(--ink); }
.btn-ghost:hover{ background: rgba(26,26,26,0.12); }
.btn-danger{ background: transparent; border:1.5px solid var(--red); color:var(--red); }
.btn-danger:hover{ background:var(--red); color:#fff; }
.btn-success{ background: var(--green); color:#fff; }
.btn-success:hover{ filter:brightness(1.08); }
.btn-sm{ padding:7px 14px; font-size:13px; }
.btn-block{ width:100%; }

/* ===== Work ticket motif (signature element) ===== */
.ticket{
  position:relative; background:#fff; border:1px solid var(--line); border-radius:6px;
  padding:18px 20px 20px; box-shadow: var(--shadow);
  background-image: radial-gradient(circle, transparent 3px, #fff 3.5px);
  background-size: 16px 16px;
  background-position: -8px -8px;
  clip-path: polygon(
    0 6px, 2% 0, 4% 6px, 6% 0, 8% 6px, 10% 0, 12% 6px, 14% 0, 16% 6px, 18% 0, 20% 6px, 22% 0, 24% 6px, 26% 0, 28% 6px, 30% 0, 32% 6px, 34% 0, 36% 6px, 38% 0, 40% 6px, 42% 0, 44% 6px, 46% 0, 48% 6px, 50% 0, 52% 6px, 54% 0, 56% 6px, 58% 0, 60% 6px, 62% 0, 64% 6px, 66% 0, 68% 6px, 70% 0, 72% 6px, 74% 0, 76% 6px, 78% 0, 80% 6px, 82% 0, 84% 6px, 86% 0, 88% 6px, 90% 0, 92% 6px, 94% 0, 96% 6px, 98% 0, 100% 6px,
    100% 100%, 0 100%
  );
  margin-top:8px;
}
.ticket-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; border-bottom:1.5px dashed var(--line); padding-bottom:12px; margin-bottom:12px; }
.ticket-id{ font-family:var(--mono); font-size:12px; color:#9a9a9a; letter-spacing:0.5px; }
.ticket-service{ font-family:var(--disp); font-weight:800; font-size:17px; margin-top:2px; display:flex; align-items:center; gap:8px; }
.ticket-service i{ color:var(--brass); }
.stamp{
  border:2.5px solid currentColor; border-radius:50%; width:82px; height:82px;
  display:flex; align-items:center; justify-content:center; text-align:center;
  font-family:var(--disp); font-weight:800; font-size:11px; line-height:1.15;
  transform: rotate(-9deg); flex-shrink:0; opacity:0.9;
}
.stamp.pending{ color:#9a9a9a; }
.stamp.price_proposed{ color:#3B6E9E; }
.stamp.negotiating{ color:#8447C9; }
.stamp.accepted{ color:var(--brass); }
.stamp.on_the_way{ color:#3B6E9E; }
.stamp.in_progress{ color:var(--amber); }
.stamp.completed{ color:var(--green); }
.stamp.rejected{ color:var(--red); }
.ticket-row{ display:flex; justify-content:space-between; font-size:14px; padding:4px 0; color:#5a5a5a; }
.ticket-row b{ color:var(--ink); font-weight:700; }
.ticket-actions{ margin-top:14px; display:flex; gap:8px; flex-wrap:wrap; }

/* ===== Stepper ===== */
.stepper{ display:flex; align-items:center; margin: 20px 0 8px; }
.step{ flex:1; text-align:center; position:relative; }
.step .dot{
  width:34px; height:34px; border-radius:50%; background:#ece9e4; color:#b0aca4; font-weight:800;
  display:flex; align-items:center; justify-content:center; margin:0 auto 8px; font-size:13px;
  border:2px solid #ece9e4; transition: all .3s;
}
.step.done .dot{ background: var(--green); border-color:var(--green); color:#fff; }
.step.current .dot{ background: var(--brass); border-color:var(--brass); color:#fff; box-shadow:0 0 0 5px rgba(255,90,0,0.20); }
.step .lbl{ font-size:12px; color:#9a9a9a; font-weight:600; }
.step.done .lbl, .step.current .lbl{ color:var(--ink); }
.step:not(:last-child)::after{
  content:''; position:absolute; top:17px; right:calc(50% + 25px); left:calc(-50% + 25px); height:2px; background:#ece9e4; z-index:0;
}
.step.done:not(:last-child)::after{ background: var(--green); }

/* ===== Misc components ===== */
.tag{ display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px; }
.tag-green{ background:rgba(29,184,106,0.12); color:var(--green); }
.tag-amber{ background:rgba(255,194,46,0.18); color:#8a5f14; }
.tag-red{ background:rgba(229,72,77,0.12); color:var(--red); }
.tag-navy{ background:rgba(26,26,26,0.08); color:var(--ink); }
.tag-blue{ background:rgba(59,110,158,0.12); color:#3B6E9E; }

.field{ margin-bottom:14px; }
.field label{ display:block; font-size:13.5px; font-weight:700; margin-bottom:6px; color:#3d372c; }
.field input, .field select, .field textarea{
  width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:10px; font-size:14px; background:#fff;
}
.field textarea{ resize:vertical; min-height:80px; }

table{ width:100%; border-collapse:collapse; font-size:14px; }
th{ text-align:right; font-size:12.5px; color:#9a9a9a; font-weight:700; padding:10px 12px; border-bottom:2px solid var(--line); }
td{ padding:12px; border-bottom:1px solid var(--line); }
tr:hover td{ background: rgba(255,90,0,0.03); }

.avatar{
  width:42px; height:42px; border-radius:50%; background: var(--ink); color:#fff; display:flex; align-items:center;
  justify-content:center; font-weight:800; font-family:var(--disp); flex-shrink:0;
}
.stars{ color:var(--amber); letter-spacing:2px; font-size:13px; }
.stars i{ margin-left:1px; }
.empty{ text-align:center; padding:50px 20px; color:#9a9a9a; }
.empty .ic{ font-size:36px; margin-bottom:10px; color:#c9c9c9; }

/* ===== Map ===== */

function stars(rating){
  const full = Math.round(rating);
  let html = '<span class="stars">';
  for(let i=0;i<5;i++) html += `<i class="fa-solid fa-star" style="${i<full?'':'opacity:.28'}"></i>`;
  html += '</span>';
  return html;
}

function toast(msg){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className='toast';
  el.innerHTML = `<i class="fa-solid fa-bell"></i><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 3200);
}

}
function completeLogin(){
  if(!state.loginAccountType) state.loginAccountType = 'customer';
  const nameField = document.getElementById('olsName');
  if(state.authMode==='signup' && nameField && !nameField.value.trim()){
    // allow empty sign-up name by falling back to a generic label
    nameField.value = 'مستخدم';
  }
  const phoneField = document.getElementById('olsPhone');
  if(phoneField && !phoneField.value.trim()){
    phoneField.value = '01000000000';
  }
  const passwordField = document.getElementById('olsPassword');
  if(passwordField && !passwordField.value){

  state.loggedIn = true;
  render();

function adminLogin(){
  state.role = 'admin'; state.loggedIn = true; render();

function logout(){
  state.loggedIn = false; state.loginAccountType = null; state.authMode='login';

}

}

function toggleProfileMenu(){

let _ostaMap=null, _ostaMarker=null, _addrDebounce=null;
function defaultLatLng(){
  return state.booking.location || {lat:31.1330, lng:30.1319}; // Kafr El Dawwar, Beheira
}
function initLocationMap(){
  const mapDiv = document.getElementById('leafletMap');
  if(!mapDiv || typeof L === 'undefined') return;
  if(_ostaMap){ _ostaMap.remove(); _ostaMap=null; }
  const start = defaultLatLng();
  _ostaMap = L.map('leafletMap').setView([start.lat, start.lng], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap contributors', maxZoom:19
  }).addTo(_ostaMap);
  _ostaMarker = L.marker([start.lat, start.lng], {draggable:true}).addTo(_ostaMap);
  _ostaMarker.on('dragend', ()=>{ const p=_ostaMarker.getLatLng(); setBookingLocation(p.lat,p.lng); });
  _ostaMap.on('click', (e)=>{ _ostaMarker.setLatLng(e.latlng); setBookingLocation(e.latlng.lat, e.latlng.lng); });
  updateGoogleMapsLink(start.lat, start.lng);
}
function updateGoogleMapsLink(lat,lng){
  const a = document.getElementById('googleMapsLink');
  if(a) a.href = `https://www.google.com/maps?q=${lat},${lng}`;
}
function setBookingLocation(lat,lng){
  state.booking.location = {lat,lng};
  updateGoogleMapsLink(lat,lng);
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ar`)
    .then(r=>r.json()).then(d=>{
      const inp = document.getElementById('addrInput');
      if(inp && d && d.display_name){ inp.value = d.display_name; state.booking.address = d.display_name; }
    }).catch(()=>{});
}
function onAddrSearchInput(){
  clearTimeout(_addrDebounce);
  const q = document.getElementById('addrSearch').value.trim();
  const box = document.getElementById('addrSuggestions');
  if(q.length<3){ box.style.display='none'; box.innerHTML=''; return; }
  _addrDebounce = setTimeout(()=>{
    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=eg&limit=5&accept-language=ar`)
      .then(r=>r.json()).then(list=>{
        if(!list.length){ box.innerHTML = `<button disabled><i class="fa-solid fa-circle-info"></i> لا توجد نتائج</button>`; box.style.display='block'; return; }
        box.innerHTML = list.map((p,i)=>`<button onclick="selectAddrSuggestion(${i})"><i class="fa-solid fa-location-dot"></i>${p.display_name}</button>`).join('');
        window._addrResults = list;
        box.style.display='block';
      }).catch(()=>{ box.style.display='none'; });
  }, 450);
}
function selectAddrSuggestion(i){
  const p = window._addrResults[i];
  if(!p) return;
  const lat=parseFloat(p.lat), lng=parseFloat(p.lon);
  document.getElementById('addrSuggestions').style.display='none';
  document.getElementById('addrSearch').value = p.display_name;
  document.getElementById('addrInput').value = p.display_name;
  state.booking.address = p.display_name;
  state.booking.location = {lat,lng};
  if(_ostaMap){ _ostaMap.setView([lat,lng],16); _ostaMarker.setLatLng([lat,lng]); }
  updateGoogleMapsLink(lat,lng);
}
function useMyLocation(){
  if(!navigator.geolocation){ toast('المتصفح لا يدعم تحديد الموقع'); return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat, longitude:lng} = pos.coords;
    if(_ostaMap){ _ostaMap.setView([lat,lng],16); _ostaMarker.setLatLng([lat,lng]); }
    setBookingLocation(lat,lng);
  }, ()=> toast('تعذّر الوصول لموقعك، حدّده يدوياً على الخريطة'));
}
function confirmLocation(){
  state.booking.address = document.getElementById('addrInput').value || state.booking.address || 'كفر الدوار، البحيرة';
  if(!state.booking.location) state.booking.location = defaultLatLng();
  state.customerView='booking';
  render();
}

function viewBooking(){
  const tech = TECHNICIANS.find(t=>t.id===state.booking.techId);
  const svcPrice = state.servicePrices.find(s=>s.id===state.booking.serviceId);
  const avg = svcPrice ? svcPrice.base + 40 : 150;
  state.booking.estimate = avg;
  return `
  <div class="view">
    <div class="page-head">
      <h1>تفاصيل الحجز</h1>
      <p>راجع بيانات الحجز قبل الإرسال للأسطى.</p>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <div class="section-title" style="margin-top:0;"><span class="bar"></span>اختر الوقت المطلوب لتنفيذ الخدمة</div>

function approvePriceCustomer(id){

  toast('تم تأكيد السعر، سيبدأ الأسطى بالتوجه إليك قريباً');
  render();
}
function negotiatePrice(id){
  const o = state.orders.find(x=>x.id===id);
  o.status='negotiating';
  state.chat.push({from:'me', text:'ممكن نتفاوض شوية على السعر المقترح لطلب '+id+'؟'});
  toast('تم فتح التفاوض، تابع المحادثة مع الأسطى');
  state.customerView='support';

function cancelOrderPrice(id){
  const o = state.orders.find(x=>x.id===id);

}
let tempRating = null;
function rateOrder(id, n){
  tempRating = n;
  const picker = document.getElementById('starPicker');
  if(picker) picker.innerHTML = [1,2,3,4,5].map(i=>`<i class="fa-solid fa-star" onclick="rateOrder('${id}',${i})" style="margin-left:4px; color:${i<=n?'var(--amber)':'#ddd'};"></i>`).join('');
}
function submitReviewOnly(id){
  const order = state.orders.find(o=>o.id===id);
  order.rating = tempRating || 5;
  order.review = document.getElementById('reviewText').value || 'خدمة ممتازة، شكراً.';

}

function notifIcon(text){
  if(text.includes('الطريق')) return 'fa-truck-fast';
  if(text.includes('قبول') || text.includes('تأكيد') || text.includes('وافق')) return 'fa-circle-check';
  if(text.includes('تقييم')) return 'fa-star';
  if(text.includes('سعر')) return 'fa-file-invoice-dollar';
  if(text.includes('أرباح') || text.includes('تحويل')) return 'fa-sack-dollar';
  if(text.includes('طلب جديد')) return 'fa-inbox';
  if(text.includes('اعتذر') || text.includes('رفض')) return 'fa-triangle-exclamation';
  return 'fa-bell';
}
function renderNotifCard(n, scope){
  const icon = notifIcon(n.text);
  const orderMatch = n.text.match(/OST-\d+/);
  const order = orderMatch ? state.orders.find(o=>o.id===orderMatch[0]) : null;
  return `
  <div class="card" style="margin-bottom:10px; cursor:pointer; transition:box-shadow .15s;" onclick="toggleNotif('${scope}',${n.id})">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">

        <div class="ticket-row"><span>الخدمة</span><b>${order.service}</b></div>
        <div class="ticket-row"><span>الفني</span><b>${order.techName}</b></div>
        <div class="ticket-row"><span>الحالة</span><span class="tag ${order.status==='completed'?'tag-green':order.status==='rejected'?'tag-red':'tag-amber'}">${STATUS_META[order.status].label}</span></div>
        ${order.price?`<div class="ticket-row"><span>السعر</span><b>${order.price} ج.م</b></div>`:''}
        <button class="btn btn-outline btn-sm" style="margin-top:10px;" onclick="event.stopPropagation(); ${scope==='customer'?"goCustomer('tracking')":`goTech('${['accepted','on_the_way','in_progress'].includes(order.status)?'current':'requests'}')`};">عرض الطلب بالتفصيل</button>
      ` : `<p class="subtle">لا توجد تفاصيل إضافية مرتبطة بهذا الإشعار حالياً.</p>`}
    </div>` : ''}
  </div>`;
}

  const list = scope==='customer' ? state.notifications.customer : state.notifications.technician;

function sendChat(){
  const inp = document.getElementById('chatInput');
  if(!inp.value.trim()) return;
  state.chat.push({from:'me', text:inp.value});
  inp.value='';
  render();
  setTimeout(()=>{ state.chat.push({from:'them', text:'تمام، وصلتني رسالتك 👍'}); render(); }, 900);
}

function techRespond(id, accept){
  const o = state.orders.find(x=>x.id===id);
  if(!accept){
    o.status = 'rejected';
    state.notifications.customer.unshift({id:Date.now(), text:'اعتذر الفني عن تنفيذ الطلب '+id, time:'الآن', unread:true});
    toast('تم رفض الطلب');
    render();
    return;
  }
  o._settingPrice = true;
  render();
}
function quickSetPrice(id, val){
  const input = document.getElementById('priceInput_'+id);
  if(input) input.value = val;
}
function submitTechPrice(id){
  const o = state.orders.find(x=>x.id===id);
  const input = document.getElementById('priceInput_'+id);
  const durInput = document.getElementById('durationInput_'+id);
  const price = parseInt(input.value) || o.estimatedPrice;
  const duration = durInput ? durInput.value : 'ساعة';
  o.proposedPrice = price;
  o.duration = duration;
  o.status = 'price_proposed';
  o._settingPrice = false;
  state.notifications.customer.unshift({id:Date.now(), text:'حدد الفني '+o.techName+' سعر طلبك رقم '+id+': '+price+' ج.م (مدة تقريبية: '+duration+')', time:'الآن', unread:true});
  toast('تم إرسال السعر للعميل، بانتظار موافقته');
  render();
}

function advanceOrder(id){
  const o = state.orders.find(x=>x.id===id);

  state.notifications.customer.unshift({id:Date.now(), text: labels[o.status]+' — طلب '+o.id, time:'الآن', unread:true});

}

function viewTechChat(){
  const chats = [...state.techChats].sort((a,b)=> (b.unread>0)-(a.unread>0));
  const active = state.techChats.find(c=>c.id===state.activeChatId);
  return `
  <div class="view">
    <div class="page-head"><h1>التواصل مع العملاء</h1><p>عدة عملاء بيكلموك دلوقتي — اختَر المحادثة اللي عايز تدخلها.</p></div>
    <div class="wa-shell">
      <div class="wa-list">
        <div class="wa-list-head"><span><i class="fa-solid fa-comments"></i> المحادثات</span><span class="tag" style="background:rgba(255,255,255,0.15); color:#fff;">${state.techChats.filter(c=>c.unread>0).length} جديد</span></div>
        <div class="wa-list-search"><input placeholder="بحث عن عميل..."><i class="fa-solid fa-magnifying-glass"></i></div>
        ${chats.map(c=>{
          const last = c.messages[c.messages.length-1];
          return `
          <div class="wa-chat-item ${state.activeChatId===c.id?'active':''}" onclick="selectTechChat('${c.id}')">
            <div class="wa-avatar">${c.letter}${c.online?'<span class="dot-online"></span>':''}</div>
            <div class="wa-meta">
              <div class="wa-name-row"><span class="wa-name">${c.name}</span><span class="wa-time">${last?last.time:''}</span></div>
              <div class="wa-row2">
                <span class="wa-preview">${last?(last.from==='me'?'أنت: ':'')+last.text:'لا توجد رسائل بعد'}</span>
                ${c.unread>0?`<span class="wa-unread">${c.unread}</span>`:''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="wa-panel">
        ${!active ? `
        <div class="wa-empty"><i class="fa-solid fa-comments"></i><div>اختَر محادثة من القائمة عشان تبدأ الرد على العميل</div></div>
        ` : `
        <div class="wa-panel-head">
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="wa-avatar" style="width:38px; height:38px; font-size:14px;">${active.letter}${active.online?'<span class="dot-online"></span>':''}</div>
            <div>
              <div style="font-weight:800; font-size:14.5px;">${active.name}</div>
              <div class="subtle" style="font-size:12px;">${active.online?'متصل الآن':'غير متصل'} ${active.orderId?(' · طلب '+active.orderId):''}</div>
            </div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="goTech('current')"><i class="fa-solid fa-clipboard-list"></i> تفاصيل الطلب</button>
        </div>
        <div class="wa-panel-msgs" id="waMsgs">
          ${active.messages.map(m=>`<div class="wa-msg ${m.from==='me'?'me':'them'}">${m.text}<span class="wa-msg-time">${m.time||''}</span></div>`).join('')}
        </div>
        <div class="wa-panel-input">
          <input id="waInput" placeholder="اكتب رسالة للعميل..." onkeydown="if(event.key==='Enter') sendTechChatMsg()">
          <button class="wa-send-btn" onclick="sendTechChatMsg()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
        `}
      </div>
    </div>
  </div>`;
}
function selectTechChat(id){
  state.activeChatId = id;
  const c = state.techChats.find(x=>x.id===id);
  if(c) c.unread = 0;
  render();
  setTimeout(()=>{ const box=document.getElementById('waMsgs'); if(box) box.scrollTop = box.scrollHeight; }, 30);
}
function nowTime(){
  const d = new Date();
  let h = d.getHours(), m = d.getMinutes();
  const ap = h>=12 ? 'م':'ص';
  h = h%12; if(h===0) h=12;
  return h+':'+String(m).padStart(2,'0')+' '+ap;
}
function sendTechChatMsg(){
  const inp = document.getElementById('waInput');
  if(!inp || !inp.value.trim()) return;
  const c = state.techChats.find(x=>x.id===state.activeChatId);
  if(!c) return;
  c.messages.push({from:'me', text:inp.value, time:nowTime()});
  inp.value='';
  render();
  setTimeout(()=>{ const box=document.getElementById('waMsgs'); if(box) box.scrollTop = box.scrollHeight; }, 30);
  setTimeout(()=>{
    c.messages.push({from:'them', text:'تمام يا أسطى، شكراً على الرد 🙏', time:nowTime()});
    if(state.activeChatId!==c.id) c.unread++;
    render();
  }, 1100);
}

function viewTechNotifications(){
  state.notifications.technician.forEach(n=>n.unread=false);

function sendBroadcast(){
  const target = document.getElementById('bcTarget').value;
  const text = document.getElementById('bcText').value || 'إشعار جديد من إدارة أسطى';
  if(target!=='كل الفنيين') state.notifications.customer.unshift({id:Date.now(), text, time:'الآن', unread:true});
  if(target!=='كل العملاء') state.notifications.technician.unshift({id:Date.now(), text, time:'الآن', unread:true});
  toast('تم إرسال الإشعار إلى: '+target);
  document.getElementById('bcText').value='';
}
